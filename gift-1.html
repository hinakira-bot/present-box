<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プレゼント - りりかのプレゼント箱</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: linear-gradient(135deg, #fff5f8 0%, #fdf0f8 50%, #f5f0ff 100%);
      min-height: 100vh;
      color: #5a4a5a;
    }

    /* ヘッダーナビ */
    nav {
      padding: 20px 32px;
    }

    nav a {
      font-size: 0.85rem;
      color: #b08090;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #c06090;
    }

    /* メインコンテナ */
    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px 24px 80px;
    }

    /* プレゼント情報 */
    .gift-info {
      background: rgba(255, 255, 255, 0.85);
      border-radius: 24px;
      padding: 40px 36px;
      text-align: center;
      box-shadow: 0 4px 32px rgba(200, 120, 160, 0.12);
      border: 1px solid rgba(230, 180, 210, 0.4);
      backdrop-filter: blur(4px);
      margin-bottom: 24px;
    }

    .gift-emoji {
      font-size: 56px;
      display: block;
      margin-bottom: 20px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
    }

    .gift-tag {
      font-size: 0.72rem;
      font-weight: 500;
      color: #c06090;
      background: #fde8f3;
      border-radius: 20px;
      padding: 4px 14px;
      display: inline-block;
      margin-bottom: 14px;
      letter-spacing: 0.05em;
    }

    .gift-title {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.5rem;
      font-weight: 500;
      color: #7a4a6a;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .gift-desc {
      font-size: 0.9rem;
      color: #9a7a8a;
      line-height: 1.9;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #e8a0c0, transparent);
      margin: 24px auto;
    }

    /* パスワードフォーム */
    .password-section {
      background: rgba(255, 255, 255, 0.85);
      border-radius: 24px;
      padding: 36px;
      text-align: center;
      box-shadow: 0 4px 32px rgba(200, 120, 160, 0.12);
      border: 1px solid rgba(230, 180, 210, 0.4);
      backdrop-filter: blur(4px);
    }

    .lock-icon {
      font-size: 36px;
      display: block;
      margin-bottom: 16px;
    }

    .password-section h2 {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.1rem;
      color: #7a4a6a;
      margin-bottom: 8px;
    }

    .password-section p {
      font-size: 0.82rem;
      color: #b08090;
      margin-bottom: 24px;
      line-height: 1.7;
    }

    .input-wrap {
      position: relative;
      max-width: 300px;
      margin: 0 auto 16px;
    }

    .password-input {
      width: 100%;
      padding: 14px 48px 14px 20px;
      border-radius: 14px;
      border: 1.5px solid rgba(220, 160, 190, 0.6);
      background: #fff8fb;
      font-size: 1rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      color: #5a4a5a;
      outline: none;
      text-align: center;
      letter-spacing: 0.15em;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .password-input:focus {
      border-color: #e090c0;
      box-shadow: 0 0 0 3px rgba(220, 120, 170, 0.12);
    }

    .password-input::placeholder {
      letter-spacing: 0.05em;
      color: #d0b0c0;
    }

    .toggle-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      opacity: 0.5;
      padding: 4px;
    }

    .submit-btn {
      display: block;
      width: 100%;
      max-width: 300px;
      margin: 0 auto;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #e890c0, #c870a8);
      color: white;
      font-size: 0.95rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 500;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 4px 16px rgba(200, 100, 150, 0.3);
    }

    .submit-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .error-msg {
      font-size: 0.82rem;
      color: #e07090;
      margin-top: 12px;
      min-height: 1.2em;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .error-msg.show {
      opacity: 1;
    }

    /* ============ プレゼント中身 ============ */
    .gift-content {
      display: none;
      margin-top: 24px;
    }

    .gift-content.open {
      display: block;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .content-box {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 4px 32px rgba(200, 120, 160, 0.12);
      border: 1px solid rgba(230, 180, 210, 0.4);
    }

    .content-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .content-header span {
      font-size: 1.2rem;
    }

    .content-header h3 {
      font-family: 'Shippori Mincho', serif;
      font-size: 1rem;
      color: #c06090;
    }

    /* テキストコンテンツ（プロンプト集など） */
    .text-content {
      background: #fff8fb;
      border-radius: 12px;
      padding: 20px;
      font-size: 0.88rem;
      line-height: 2;
      color: #6a5a6a;
      white-space: pre-wrap;
      word-break: break-all;
      border: 1px solid rgba(220, 160, 190, 0.2);
      margin-bottom: 16px;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 22px;
      border-radius: 12px;
      border: 1.5px solid rgba(220, 160, 190, 0.6);
      background: white;
      color: #c06090;
      font-size: 0.85rem;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: #fde8f3;
      border-color: #e090c0;
    }

    .copy-btn.copied {
      background: #fde8f3;
      color: #c06090;
    }

    /* リンクコンテンツ */
    .link-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border-radius: 14px;
      background: #fff8fb;
      border: 1px solid rgba(220, 160, 190, 0.2);
      text-decoration: none;
      color: inherit;
      margin-bottom: 12px;
      transition: all 0.2s;
    }

    .link-item:hover {
      background: #fde8f3;
      border-color: rgba(220, 160, 190, 0.5);
      transform: translateX(4px);
    }

    .link-item:last-child {
      margin-bottom: 0;
    }

    .link-emoji {
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .link-text {
      flex: 1;
    }

    .link-text strong {
      display: block;
      font-size: 0.9rem;
      color: #7a4a6a;
      margin-bottom: 2px;
    }

    .link-text small {
      font-size: 0.78rem;
      color: #b08090;
    }

    .link-arrow {
      font-size: 0.9rem;
      color: #d0a0b8;
    }

    /* フッター */
    footer {
      text-align: center;
      padding: 32px 24px;
      font-size: 0.78rem;
      color: #c0a0b0;
      letter-spacing: 0.05em;
    }

    @media (max-width: 480px) {
      .container {
        padding: 12px 16px 60px;
      }
      .gift-info,
      .password-section,
      .content-box {
        padding: 28px 24px;
      }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">← プレゼント箱に戻る</a>
  </nav>

  <div class="container">

    <!-- プレゼント情報 -->
    <div class="gift-info">
      <span class="gift-emoji">✨</span>
      <div class="gift-tag">プロンプト集</div>
      <h1 class="gift-title">タイトルをここに入力</h1>
      <div class="divider"></div>
      <p class="gift-desc">
        プレゼントの説明文をここに書きます。<br>
        どんな人に向けたもので、どう使えるかを<br>
        やさしく伝えてあげましょう。
      </p>
    </div>

    <!-- パスワード入力 -->
    <div class="password-section" id="passwordSection">
      <span class="lock-icon">🔒</span>
      <h2>パスワードを入力してね</h2>
      <p>パスワードはSNSやライブ配信でお知らせしています。</p>

      <div class="input-wrap">
        <input
          type="password"
          class="password-input"
          id="passwordInput"
          placeholder="パスワードを入力"
          autocomplete="off"
        >
        <button class="toggle-btn" id="toggleBtn" onclick="togglePassword()" title="表示切り替え">👁</button>
      </div>

      <button class="submit-btn" onclick="checkPassword()">受け取る 🎁</button>
      <p class="error-msg" id="errorMsg">パスワードが違います</p>
    </div>

    <!-- プレゼント中身（ロック解除後に表示） -->
    <div class="gift-content" id="giftContent">
      <div class="content-box">
        <div class="content-header">
          <span>🎀</span>
          <h3>プレゼントをどうぞ</h3>
        </div>

        <!--
          ▼ コンテンツの種類に応じて以下のどちらかを使ってください

          【A】プロンプトやテキストを表示する場合 → この .text-content ブロックを使用
          【B】外部リンクを表示する場合 → .link-item ブロックを使用
        -->

        <!-- A: テキストコンテンツ（プロンプト集など） -->
        <div class="text-content" id="promptText">ここにプロンプトや本文を入力します。

例えば：
「ChatGPTに使えるプロンプト10選」などのテキストをそのまま貼り付けてOKです。

改行もそのまま反映されます。</div>
        <button class="copy-btn" id="copyBtn" onclick="copyText()">
          <span>📋</span> テキストをコピー
        </button>

        <!--
        B: リンクコンテンツ（ツールリンクなど）
        ↓ Aが不要な場合は上のAブロックを削除し、こちらのコメントを外してください

        <a class="link-item" href="https://example.com" target="_blank" rel="noopener">
          <span class="link-emoji">🔗</span>
          <div class="link-text">
            <strong>ツール名</strong>
            <small>ツールの簡単な説明</small>
          </div>
          <span class="link-arrow">→</span>
        </a>

        <a class="link-item" href="https://example.com" target="_blank" rel="noopener">
          <span class="link-emoji">✨</span>
          <div class="link-text">
            <strong>ツール名2</strong>
            <small>ツールの簡単な説明</small>
          </div>
          <span class="link-arrow">→</span>
        </a>
        -->

      </div>
    </div>

  </div>

  <footer>© りりか</footer>

  <script>
    // ============ 設定 ============
    const CORRECT_PASSWORD = 'password123'; // ← ここを変更してください
    // =============================

    function checkPassword() {
      const input = document.getElementById('passwordInput').value.trim();
      const errorMsg = document.getElementById('errorMsg');

      if (input === CORRECT_PASSWORD) {
        // 正解
        document.getElementById('passwordSection').style.display = 'none';
        document.getElementById('giftContent').classList.add('open');
        sessionStorage.setItem('gift1_unlocked', 'true');
      } else {
        // 不正解
        errorMsg.classList.add('show');
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
        setTimeout(() => errorMsg.classList.remove('show'), 3000);
      }
    }

    // Enterキー対応
    document.getElementById('passwordInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPassword();
    });

    // パスワード表示切り替え
    function togglePassword() {
      const input = document.getElementById('passwordInput');
      const btn = document.getElementById('toggleBtn');
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁';
      }
    }

    // テキストコピー
    function copyText() {
      const text = document.getElementById('promptText').innerText;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.innerHTML = '<span>✅</span> コピーしました！';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = '<span>📋</span> テキストをコピー';
          btn.classList.remove('copied');
        }, 2500);
      });
    }

    // セッション中は再入力不要
    window.addEventListener('load', function() {
      if (sessionStorage.getItem('gift1_unlocked') === 'true') {
        document.getElementById('passwordSection').style.display = 'none';
        document.getElementById('giftContent').classList.add('open');
      }
    });
  </script>

</body>
</html>
