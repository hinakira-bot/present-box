<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>りりかのプレゼント箱</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: linear-gradient(135deg, #fff5f8 0%, #fdf0f8 50%, #f5f0ff 100%);
      min-height: 100vh;
      color: #5a4a5a;
    }

    header {
      text-align: center;
      padding: 56px 24px 40px;
    }

    .header-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 16px;
      filter: drop-shadow(0 2px 8px rgba(220,120,160,0.3));
    }

    header h1 {
      font-family: 'Shippori Mincho', serif;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 500;
      color: #c06090;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }

    header p {
      font-size: 0.95rem;
      color: #a07090;
      line-height: 1.8;
      max-width: 480px;
      margin: 0 auto;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #e8a0c0, transparent);
      margin: 24px auto 0;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 28px;
    }

    .gift-card {
      background: rgba(255,255,255,0.85);
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow: 0 4px 24px rgba(200,120,160,0.1);
      border: 1px solid rgba(230,180,210,0.4);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      backdrop-filter: blur(4px);
    }

    .gift-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(200,120,160,0.2);
    }

    .card-emoji { font-size: 40px; margin-bottom: 16px; }

    .card-tag {
      font-size: 0.72rem;
      font-weight: 500;
      color: #c06090;
      background: #fde8f3;
      border-radius: 20px;
      padding: 4px 12px;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }

    .card-title {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.1rem;
      font-weight: 500;
      color: #7a4a6a;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .card-desc {
      font-size: 0.85rem;
      color: #9a7a8a;
      line-height: 1.7;
      margin-bottom: 20px;
      flex: 1;
    }

    .card-lock {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: #b08090;
      background: #fff0f7;
      border-radius: 20px;
      padding: 6px 16px;
      border: 1px solid rgba(220,160,190,0.4);
    }

    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: #c0a0b0;
      font-size: 0.9rem;
      line-height: 1.8;
    }

    .empty-state span { font-size: 2.5rem; display: block; margin-bottom: 12px; }

    .admin-link {
      position: fixed;
      top: 14px;
      right: 16px;
      font-size: 0.72rem;
      color: rgba(180,140,160,0.5);
      text-decoration: none;
      padding: 5px 10px;
      border-radius: 20px;
      transition: color 0.2s, background 0.2s;
      z-index: 100;
    }
    .admin-link:hover {
      color: #c06090;
      background: rgba(255,255,255,0.7);
    }

    footer {
      text-align: center;
      padding: 32px 24px;
      font-size: 0.78rem;
      color: #c0a0b0;
    }

    @media (max-width: 480px) {
      header { padding: 40px 20px 32px; }
      main { padding: 28px 16px 60px; }
      .grid { grid-template-columns: 1fr; gap: 20px; }
    }
  </style>
</head>
<body>
  <a class="admin-link" href="admin.html">管理</a>

  <header>
    <span class="header-icon">🎁</span>
    <h1>りりかのプレゼント箱</h1>
    <p>ママたちへ、こころを込めて。<br>受け取り方法はそれぞれのページでご確認ください。</p>
    <div class="divider"></div>
  </header>

  <main>
    <div class="grid" id="giftGrid"></div>
  </main>

  <footer>© りりか</footer>

  <script src="gifts-data.js"></script>
  <script>
    const grid = document.getElementById('giftGrid');
    const active = GIFTS_DATA.gifts.filter(g => g.active);

    if (active.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <span>🎁</span>
          ただいま準備中です。<br>もうしばらくお待ちください。
        </div>`;
    } else {
      active.forEach(g => {
        const a = document.createElement('a');
        a.className = 'gift-card';
        a.href = `gift.html?id=${g.id}`;
        a.innerHTML = `
          <div class="card-emoji">${g.emoji}</div>
          ${g.tag ? `<div class="card-tag">${g.tag}</div>` : ''}
          <div class="card-title">${g.title}</div>
          <div class="card-desc">${g.description}</div>
          <div class="card-lock"><span>🔒</span> パスワードで受け取る</div>`;
        grid.appendChild(a);
      });
    }
  </script>
</body>
</html>
